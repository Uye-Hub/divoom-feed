<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ticket Updater</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0d1117;
      color: #e6edf3;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .card {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 40px;
      width: 100%;
      max-width: 520px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }
    h1 {
      font-size: 1.4rem;
      margin-bottom: 8px;
      color: #f0f6fc;
    }
    .subtitle {
      color: #8b949e;
      font-size: 0.9rem;
      margin-bottom: 32px;
    }
    .token-section {
      margin-bottom: 28px;
    }
    label {
      display: block;
      font-size: 0.85rem;
      color: #8b949e;
      margin-bottom: 6px;
      font-weight: 500;
    }
    input[type="password"], input[type="number"] {
      width: 100%;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      color: #e6edf3;
      font-size: 1rem;
      padding: 10px 14px;
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="password"]:focus, input[type="number"]:focus {
      border-color: #58a6ff;
    }
    .token-hint {
      font-size: 0.78rem;
      color: #8b949e;
      margin-top: 6px;
    }
    .token-hint a {
      color: #58a6ff;
      text-decoration: none;
    }
    .counts {
      display: flex;
      gap: 16px;
      margin-bottom: 28px;
    }
    .count-box {
      flex: 1;
    }
    .count-box input {
      font-size: 2.5rem;
      font-weight: 700;
      text-align: center;
      padding: 16px;
      color: #f0f6fc;
    }
    .count-box.open input { border-color: #238636; }
    .count-box.open input:focus { border-color: #3fb950; }
    .count-box.closed input { border-color: #da3633; }
    .count-box.closed input:focus { border-color: #f85149; }
    .count-label { text-align: center; }
    button {
      width: 100%;
      padding: 14px;
      font-size: 1rem;
      font-weight: 600;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      background: #238636;
      color: #fff;
      transition: background 0.2s, transform 0.1s;
    }
    button:hover { background: #2ea043; }
    button:active { transform: scale(0.98); }
    button:disabled { background: #21262d; color: #8b949e; cursor: not-allowed; }
    #status {
      margin-top: 16px;
      padding: 12px 16px;
      border-radius: 6px;
      font-size: 0.9rem;
      display: none;
    }
    #status.success {
      background: #0f2d1a;
      border: 1px solid #238636;
      color: #3fb950;
      display: block;
    }
    #status.error {
      background: #2d0f0f;
      border: 1px solid #da3633;
      color: #f85149;
      display: block;
    }
    #status.loading {
      background: #111d2e;
      border: 1px solid #1f6feb;
      color: #58a6ff;
      display: block;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Ticket Counter Updater</h1>
    <p class="subtitle">Updates tickets.xml on GitHub Pages automatically</p>

    <div class="token-section">
      <label for="token">GitHub Token</label>
      <input type="password" id="token" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" />
      <p class="token-hint">
        Need a token? <a href="https://github.com/settings/tokens/new?scopes=repo&description=Divoom+Updater" target="_blank">Create one here</a> (check the <strong>repo</strong> box).
        Your token is never sent anywhere except directly to GitHub.
      </p>
    </div>

    <div class="counts">
      <div class="count-box open">
        <label class="count-label" for="open">Open</label>
        <input type="number" id="open" min="0" value="" placeholder="0" />
      </div>
      <div class="count-box closed">
        <label class="count-label" for="closed">Closed</label>
        <input type="number" id="closed" min="0" value="" placeholder="0" />
      </div>
    </div>

    <button id="updateBtn" onclick="updateTickets()">Update tickets.xml</button>
    <div id="status"></div>
  </div>

  <script>
    const REPO = 'Uye-Hub/divoom-feed';
    const FILE = 'tickets.xml';

    function setStatus(msg, type) {
      const el = document.getElementById('status');
      el.textContent = msg;
      el.className = type;
    }

    async function updateTickets() {
      const token = document.getElementById('token').value.trim();
      const open = document.getElementById('open').value.trim();
      const closed = document.getElementById('closed').value.trim();
      const btn = document.getElementById('updateBtn');

      if (!token) { setStatus('Please enter your GitHub token.', 'error'); return; }
      if (open === '' || closed === '') { setStatus('Please enter both Open and Closed counts.', 'error'); return; }

      btn.disabled = true;
      setStatus('Fetching current file...', 'loading');

      try {
        const apiUrl = 'https://api.github.com/repos/' + REPO + '/contents/' + FILE;
        const headers = {
          'Authorization': 'token ' + token,
          'Accept': 'application/vnd.github.v3+json'
        };

        const getRes = await fetch(apiUrl, { headers });
        if (!getRes.ok) {
          const err = await getRes.json();
          throw new Error(err.message || 'Failed to fetch file');
        }
        const fileData = await getRes.json();
        const sha = fileData.sha;

        const now = new Date();
        const pad = n => String(n).padStart(2, '0');
        const months = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
        const days = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
        const pubDate = days[now.getDay()] + ', ' + pad(now.getDate()) + ' ' + months[now.getMonth()] + ' ' + now.getFullYear() + ' ' + pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':00 PDT';

        const xml = '<?xml version="1.0" encoding="UTF-8"?>' + '
' +
'<rss version="2.0">' + '
' +
'  <channel>' + '
' +
'    <title>ServiceNow Ticket Counter</title>' + '
' +
'    <description>Manual ticket count feed</description>' + '
' +
'    <link>https://uye-hub.github.io/divoom-feed/tickets.xml</link>' + '

' +
'    <item>' + '
' +
'      <title>Open: ' + open + '</title>' + '
' +
'      <description>Current open ticket count is ' + open + '</description>' + '
' +
'      <pubDate>' + pubDate + '</pubDate>' + '
' +
'      <guid>ticket-count-' + Date.now() + '</guid>' + '
' +
'    </item>' + '

' +
'    <item>' + '
' +
'      <title>Closed: ' + closed + '</title>' + '
' +
'      <description>' + closed + ' cases closed</description>' + '
' +
'      <pubDate>' + pubDate + '</pubDate>' + '
' +
'      <guid>status-' + Date.now() + '</guid>' + '
' +
'    </item>' + '

' +
'  </channel>' + '
' +
'</rss>';

        setStatus('Saving to GitHub...', 'loading');

        const content = btoa(unescape(encodeURIComponent(xml)));
        const putRes = await fetch(apiUrl, {
          method: 'PUT',
          headers: Object.assign({}, headers, {'Content-Type': 'application/json'}),
          body: JSON.stringify({
            message: 'Update tickets: Open ' + open + ', Closed ' + closed,
            content,
            sha
          })
        });

        if (!putRes.ok) {
          const err = await putRes.json();
          throw new Error(err.message || 'Failed to save file');
        }

        setStatus('Done! tickets.xml updated - Open: ' + open + ', Closed: ' + closed, 'success');
      } catch (e) {
        setStatus('Error: ' + e.message, 'error');
      } finally {
        btn.disabled = false;
      }
    }
  </script>
</body>
</html>
